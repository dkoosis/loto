# .sandbox/project.conf — loto
PROJECT_NAME=loto

# go-sandbox version (tag, branch, or commit hash; "latest" = HEAD)
GO_SANDBOX_REF=v0.2.0

# Binaries to cross-compile (space-separated "name:path" pairs)
PROJECT_BINS="loto:./cmd/loto/"

# Tools provided by the Codex base image (assumed present, never cross-compiled)
BASE_IMAGE_TOOLS="go jq"

# Tools we ship as prebuilt binaries under .sandbox/bin/linux-{amd64,arm64}/
# Empty for now — loto's QA loop is just `go vet`, `go test -race`, `go build`.
# Add golangci-lint here once we want sandbox-side lint (run `make cross` to populate).
PREBUILT_TOOLS=""

# OPTIONAL_TOOLS: nice-to-have, not fatal if missing
OPTIONAL_TOOLS="golangci-lint staticcheck"

# go mod download needs local-replace stripping (loto has no local replaces today)
HAS_LOCAL_REPLACES=false

# Extra env vars for setup (space-separated KEY=VALUE)
SETUP_ENV=""

# Build system (make or mage)
BUILD_SYSTEM=make
