version: 3
workdir: .

exclude:
  - .sandbox
  - bin
  - docs

# Layering invariants for loto v2:
#   cmd/loto → internal/cli (only)
#   internal/cli → {domain, store, identity, render}
#   internal/render → {domain, store, identity}
#   internal/store → internal/domain
#   internal/identity → ∅
#   internal/domain → ∅ (pure functions, no internal deps)
#
# Keep simple. Fail fast on back-edges (e.g., domain importing store).

allow:
  depOnAnyVendor: true

components:
  main:
    in: cmd/loto/**
  cli:
    in: internal/cli/**
  store:
    in: internal/store/**
  identity:
    in: internal/identity/**
  domain:
    in: internal/domain/**
  render:
    in: internal/render/**
  lane:
    in: internal/lane/**

deps:
  main:
    mayDependOn:
      - cli
  cli:
    mayDependOn:
      - domain
      - store
      - identity
      - render
      - lane
  # internal/lane is pure git plumbing — stdlib only, no internal deps.
  lane:
    mayDependOn: []
  render:
    mayDependOn:
      - domain
      - store
      - identity
  store:
    mayDependOn:
      - domain
  identity:
    anyVendorDeps: true
  domain:
    anyVendorDeps: true
