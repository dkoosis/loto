name: CI

# Cost shape (private repo — macOS bills at 10x Linux minutes):
#   pull_request        : linux only           — fast, cheap gate on every PR
#   push -> main        : linux only           — cheap gate on merge
#   schedule / dispatch : macOS only           — the darwin backstop runs weekly
#                         (and on demand), NOT on every merge. dk develops on
#                         macOS locally, so routine darwin coverage is his
#                         machine; this weekly run + the high-bar `ci:macos`
#                         label catch darwin-divergent breakage in PRs he won't
#                         run himself first.
#   PR labeled ci:macos : linux + macOS        — on-demand darwin proof for a PR
#                         touching OS-divergent surface (high bar — see
#                         .claude/rules/ci-on-demand.md).
on:
  # `labeled` so adding `ci:macos` to an already-open PR re-fires CI and the
  # matrix picks up the darwin leg (default PR types don't include labeling).
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  push:
    branches: [main]
  # Weekly darwin backstop (Mon 07:00 UTC ≈ 02–03 ET) + manual trigger.
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

jobs:
  test:
    name: test (${{ matrix.name }})
    runs-on: ${{ matrix.runs-on }}
    # macOS is the 10x-billed leg, so it runs only where it earns its keep:
    #   - schedule / workflow_dispatch → macOS-ONLY (weekly darwin backstop;
    #     every PR + push-to-main already runs the full linux gate, so a weekly
    #     linux re-run is pure redundancy).
    #   - PR labeled `ci:macos` → linux + macOS.
    #   - everything else (normal PR / push) → linux-only.
    # Both legs run on GitHub-hosted runners. The self-hosted Linux box
    # ([self-hosted,Linux,loto]) was retired — it went offline and wedged the
    # `test (linux)` gate (0 runners online → no PR could get a green check).
    # ubuntu-latest is a fresh hosted checkout every run, so a runner-local
    # phantom can't recur. macOS runs on GitHub-hosted arm64 (Apple Silicon,
    # = old mac-loto arch). ~10x linux billing rate on private repos, but a
    # ~4-min run is cents.
    strategy:
      fail-fast: false
      matrix:
        include: ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && fromJSON('[{"name":"macos","runs-on":"macos-latest"}]') || (contains(github.event.pull_request.labels.*.name, 'ci:macos') && fromJSON('[{"name":"linux","runs-on":"ubuntu-latest"},{"name":"macos","runs-on":"macos-latest"}]') || fromJSON('[{"name":"linux","runs-on":"ubuntu-latest"}]')) }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test -race
        run: go test -race -count=1 ./...

      - name: build
        run: go build ./...

      # Layering gate (loto-vlid). go-arch-lint enforces .go-arch-lint.yml; CI
      # previously ran no layering check, so a back-edge merged clean whenever
      # local `make check` was skipped. Linux-only: import-graph analysis is
      # OS-independent and every PR + push-to-main runs the linux leg. Pinned to
      # match the local toolchain. Runs go-arch-lint directly (not `make arch`,
      # which also needs the `fo` formatter) — exits non-zero on any violation.
      - name: arch (layering)
        if: matrix.name == 'linux'
        run: |
          go install github.com/fe3dback/go-arch-lint@v1.15.0
          "$(go env GOPATH)/bin/go-arch-lint" check
