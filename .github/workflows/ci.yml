name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test (${{ matrix.name }})
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            runs-on: [self-hosted, Linux, loto]
          - name: macos
            # GitHub-hosted arm64 (Apple Silicon, = self-hosted mac-loto arch);
            # escapes the serial self-hosted runner queue. ~10x linux billing
            # rate on private repos, but a ~4-min run is cents.
            runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test -race
        run: go test -race -count=1 ./...

      - name: build
        run: go build ./...
